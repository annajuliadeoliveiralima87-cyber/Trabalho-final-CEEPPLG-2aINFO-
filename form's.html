<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro Escolar</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f6ff;
        }

        nav {
            background-color: #007bff;
            color: white;
            padding: 15px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 10px;
        }

        main {
            background-color: white;
            width: 300px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }

        h2 {
            margin: 0;
        }

        label {
            color: #007bff;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 5px;
            margin-top: 5px;
        }

        input[type="submit"] {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }
         footer {
            background-color: #0d47a1;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
        }
        input[type="reset"] {
            background-color: #ccc;
            border: none;
            padding: 10px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #0056b3;
        }
        .btn-link:hover {
    background-color: #1565c0;
    transform: scale(1.05);
}
    </style>

</head>
<body>

    <nav>
        <h2>Cadastro Escolar</h2>
        <a href="index.html">Home</a>
    </nav>

    <main>
        <form action="#" method="post">

            <label>Nome completo:</label><br>
            <input type="text" name="nome" required><br><br>

            <label>Data de nascimento:</label><br>
            <input type="date" name="data_nascimento" required><br><br>

            <label>Sexo:</label><br>
            <input type="radio" name="sexo" value="masculino"> Masculino
            <input type="radio" name="sexo" value="feminino"> Feminino
            <input type="radio" name="sexo" value="outro"> Outro<br><br>

            <label>Email:</label><br>
            <input type="email" name="email" required><br><br>

            <label>Telefone:</label><br>
            <input type="tel" name="telefone"><br><br>

            <label>Endereço:</label><br>
            <input type="text" name="endereco"><br><br>

            <label>Série:</label><br>
            <select name="serie">
                <option>1º ano</option>
                <option>2º ano</option>
                <option>3º ano</option>
            </select><br><br>

            <label>Curso:</label><br>
            <select name="curso">
                <option>Informática</option>
                <option>Redes</option>
            </select><br><br>

            <label>Turno:</label><br>
            <select name="turno">
                <option>Integral</option>
            </select><br><br>

            <label>Observações:</label><br>
            <textarea rows="4"></textarea><br><br>

            <input type="submit" value="Cadastrar">
            <input type="reset" value="Limpar">

        </form>
    </main>

<footer>
    <p>2026 - CEEP Professora Lourdinha Guerra</p>
</footer>

</body>
</html>
